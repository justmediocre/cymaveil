<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cymaveil</title>
  </head>
  <body>
    <div id="root">
      <style>
        .startup-spinner {
          position: fixed;
          inset: 0;
          display: flex;
          align-items: center;
          justify-content: center;
          background: #0a0a0b;
        }
        .startup-spinner::after {
          content: '';
          width: 20px;
          height: 20px;
          border: 2px solid rgba(255,255,255,0.08);
          border-top-color: rgba(212,165,116,0.5);
          border-radius: 50%;
          animation: sp .6s linear infinite;
        }
        @keyframes sp { to { transform: rotate(360deg); } }
      </style>
      <div class="startup-spinner"></div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
